name: Publish to GHCR

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * 5' # Every Friday at midnight
  workflow_dispatch:

jobs:
  push_to_registry:
    name: Push Docker image to GitHub Container Registry
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get current date/time
        id: date
        run: echo "date=$(date +'%Y.%m.%d.%H%M%S')" >> $GITHUB_OUTPUT

      - name: Set lowercase repo owner
        id: owner
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Get PrusaSlicer version from Dockerfile
        id: prusa
        run: echo "version=$(grep '^ARG PRUSA_VERSION=' Dockerfile | head -1 | cut -d= -f2)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ steps.owner.outputs.owner }}/prusaslicer-novnc:latest
            ghcr.io/${{ steps.owner.outputs.owner }}/prusaslicer-novnc:${{ steps.prusa.outputs.version }}
            ghcr.io/${{ steps.owner.outputs.owner }}/prusaslicer-novnc:${{ steps.date.outputs.date }}

name: Publish to GHCR

on:
  push:
    branches:
      - main
      - dev
  schedule:
    - cron: '0 0 * * 5' # Every Friday at midnight
  workflow_dispatch:
  workflow_run:
    workflows: ["Build PrusaSlicer (slow — run only on version bumps)"]
    types: [completed]
    branches: [main]

jobs:
  push_to_registry:
    name: Push Docker image to GitHub Container Registry
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get current date/time
        id: date
        run: echo "date=$(date +'%Y.%m.%d.%H%M%S')" >> $GITHUB_OUTPUT

      - name: Set lowercase repo owner
        id: owner
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Get PrusaSlicer version from Dockerfile
        id: prusa
        run: echo "version=$(grep '^ARG PRUSA_VERSION=' Dockerfile | head -1 | cut -d= -f2)" >> $GITHUB_OUTPUT

      - name: Set branch-aware image tags
        id: tags
        run: |
          OWNER="${{ steps.owner.outputs.owner }}"
          VERSION="${{ steps.prusa.outputs.version }}"
          DATE="${{ steps.date.outputs.date }}"
          BRANCH="${{ github.ref_name }}"
          if [ "$BRANCH" = "main" ]; then
            echo "tags<<EOF" >> $GITHUB_OUTPUT
            echo "ghcr.io/${OWNER}/prusaslicer-xpra:latest" >> $GITHUB_OUTPUT
            echo "ghcr.io/${OWNER}/prusaslicer-xpra:${VERSION}" >> $GITHUB_OUTPUT
            echo "ghcr.io/${OWNER}/prusaslicer-xpra:${DATE}" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "tags<<EOF" >> $GITHUB_OUTPUT
            echo "ghcr.io/${OWNER}/prusaslicer-xpra:${BRANCH}" >> $GITHUB_OUTPUT
            echo "ghcr.io/${OWNER}/prusaslicer-xpra:${BRANCH}-${DATE}" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check if builder image exists
        id: check_builder
        env:
          BUILDER_IMAGE: ghcr.io/${{ steps.owner.outputs.owner }}/prusaslicer-xpra-builder:${{ steps.prusa.outputs.version }}
        run: |
          docker buildx imagetools inspect "$BUILDER_IMAGE" > /dev/null 2>&1 && \
            echo "exists=true" >> $GITHUB_OUTPUT || \
            echo "exists=false" >> $GITHUB_OUTPUT

      - name: Build builder image (on-demand fallback)
        if: steps.check_builder.outputs.exists == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.builder
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            PRUSA_VERSION=version_${{ steps.prusa.outputs.version }}
          tags: |
            ghcr.io/${{ steps.owner.outputs.owner }}/prusaslicer-xpra-builder:${{ steps.prusa.outputs.version }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.tags.outputs.tags }}
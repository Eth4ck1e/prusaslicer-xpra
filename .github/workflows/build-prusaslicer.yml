name: Build PrusaSlicer (slow — run only on version bumps)

on:
  workflow_dispatch:
    inputs:
      prusa_version:
        description: 'PrusaSlicer git tag (e.g. version_2.9.4)'
        required: true
        default: 'version_2.9.4'

jobs:
  build_prusaslicer:
    name: Build and push PrusaSlicer builder image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      actions: write

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase repo owner
        id: owner
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Strip leading 'version_' prefix for image tag
        id: version
        run: echo "tag=$(echo '${{ github.event.inputs.prusa_version }}' | sed 's/^version_//')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push builder image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.builder
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            PRUSA_VERSION=${{ github.event.inputs.prusa_version }}
          tags: |
            ghcr.io/${{ steps.owner.outputs.owner }}/prusaslicer-novnc-builder:${{ steps.version.outputs.tag }}
            ghcr.io/${{ steps.owner.outputs.owner }}/prusaslicer-novnc-builder:latest

      - name: Trigger runtime image build
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/docker.yml/dispatches \
            -d "{\"ref\":\"${{ github.ref_name }}\"}"

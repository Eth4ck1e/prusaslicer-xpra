name: Build PrusaSlicer (slow — run only on version bumps)

on:
  workflow_dispatch:
    inputs:
      prusa_version:
        description: 'PrusaSlicer git tag (e.g. version_2.9.4)'
        required: true
        default: 'version_2.9.4'

jobs:
  build_prusaslicer:
    name: Build and push PrusaSlicer builder image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      actions: write

    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase repo owner
        id: owner
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Strip leading 'version_' prefix for image tag
        id: version
        run: echo "tag=$(echo '${{ github.event.inputs.prusa_version }}' | sed 's/^version_//')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Validate prusa_version tag exists upstream
        run: |
          TAG_EXISTS=$(git ls-remote --tags https://github.com/prusa3d/PrusaSlicer.git 'refs/tags/${{ github.event.inputs.prusa_version }}')
          if [ -z "$TAG_EXISTS" ]; then
            echo "::error::Invalid prusa_version: tag '${{ github.event.inputs.prusa_version }}' not found upstream at https://github.com/prusa3d/PrusaSlicer.git"
            exit 1
          fi
          echo "✓ Tag ${{ github.event.inputs.prusa_version }} verified upstream"

      - name: Build and push builder image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.builder
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            PRUSA_VERSION=${{ github.event.inputs.prusa_version }}
          tags: |
            ghcr.io/${{ steps.owner.outputs.owner }}/prusaslicer-xpra-builder:${{ steps.version.outputs.tag }}
            ghcr.io/${{ steps.owner.outputs.owner }}/prusaslicer-xpra-builder:latest

      - name: Trigger runtime image build
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/docker.yml/dispatches \
            -d "{\"ref\":\"${{ github.ref_name }}\"}"

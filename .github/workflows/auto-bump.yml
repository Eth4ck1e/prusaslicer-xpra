name: Auto-bump PrusaSlicer version

on:
  schedule:
    - cron: '0 6 * * *' # Daily at 6am UTC
  workflow_dispatch:

jobs:
  check_and_bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Get latest PrusaSlicer release tag
        id: latest
        run: |
          TAG=$(curl -s https://api.github.com/repos/prusa3d/PrusaSlicer/releases/latest | jq -r '.tag_name')
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${TAG#version_}" >> $GITHUB_OUTPUT

      - name: Get current version from Dockerfile
        id: current
        run: |
          VERSION=$(grep '^ARG PRUSA_VERSION=' Dockerfile | head -1 | cut -d= -f2)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Compare versions
        id: check
        run: |
          if [ "${{ steps.latest.outputs.version }}" != "${{ steps.current.outputs.version }}" ]; then
            echo "update=true" >> $GITHUB_OUTPUT
            echo "New version found: ${{ steps.latest.outputs.version }} (current: ${{ steps.current.outputs.version }})"
          else
            echo "update=false" >> $GITHUB_OUTPUT
            echo "Already up to date: ${{ steps.current.outputs.version }}"
          fi

      - name: Check if builder image exists for target version
        id: check_image
        run: |
          if [ "${{ steps.check.outputs.update }}" = "true" ]; then
            VERSION="${{ steps.latest.outputs.version }}"
            TAG="${{ steps.latest.outputs.tag }}"
          else
            VERSION="${{ steps.current.outputs.version }}"
            TAG="version_${{ steps.current.outputs.version }}"
          fi
          echo "target_version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "target_tag=${TAG}" >> "$GITHUB_OUTPUT"
          IMAGE="ghcr.io/eth4ck1e/prusaslicer-xpra-builder:${VERSION}"
          if docker manifest inspect "$IMAGE" > /dev/null 2>&1; then
            echo "builder_missing=false" >> "$GITHUB_OUTPUT"
            echo "✓ Builder image $IMAGE already exists"
          else
            echo "builder_missing=true" >> "$GITHUB_OUTPUT"
            echo "Builder image $IMAGE not found — will build it"
          fi

      - name: Commit version bump to release branch
        if: steps.check.outputs.update == 'true'
        run: |
          NEW_VERSION="${{ steps.latest.outputs.version }}"
          NEW_TAG="${{ steps.latest.outputs.tag }}"
          BRANCH="release/v${NEW_VERSION}"

          # Create a release branch from the current main state
          git checkout -b "${BRANCH}"

          # Runtime Dockerfile uses bare version (e.g. 2.9.4)
          sed -i "s/^ARG PRUSA_VERSION=.*/ARG PRUSA_VERSION=${NEW_VERSION}/" Dockerfile
          # Builder Dockerfile uses full git tag (e.g. version_2.9.4)
          sed -i "s/^ARG PRUSA_VERSION=.*/ARG PRUSA_VERSION=${NEW_TAG}/" Dockerfile.builder

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Dockerfile Dockerfile.builder
          git commit -m "chore: bump PrusaSlicer ${{ steps.current.outputs.version }} → ${NEW_VERSION} [skip ci]"
          git push origin "${BRANCH}"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
          echo "Pushed version bump to ${BRANCH} (not main — requires manual verification and merge)"

      - name: Trigger builder workflow
        if: steps.check_image.outputs.builder_missing == 'true'
        id: trigger
        run: |
          # Record the current latest run so the wait step can
          # find the run *we* just dispatched (not a stale one).
          BEFORE=$(gh run list \
            --workflow build-prusaslicer.yml \
            --json databaseId \
            --jq '.[0].databaseId' \
            --limit 1 2>/dev/null || echo "0")
          echo "before=${BEFORE}" >> "$GITHUB_OUTPUT"
          BRANCH="release/v${{ steps.latest.outputs.version }}"
          gh workflow run build-prusaslicer.yml \
            --ref main \
            -f prusa_version="${{ steps.check_image.outputs.target_tag }}"

      - name: Wait for builder workflow to complete
        if: steps.check_image.outputs.builder_missing == 'true'
        run: |
          BEFORE="${{ steps.trigger.outputs.before }}"
          echo "Pre-dispatch latest run: ${BEFORE}"

          # Poll until a *new* run appears
          echo "Waiting for new builder run to appear..."
          for i in $(seq 1 12); do
            RUN_ID=$(gh run list \
              --workflow build-prusaslicer.yml \
              --json databaseId \
              --jq '.[0].databaseId' \
              --limit 1)
            if [ -n "$RUN_ID" ] && [ "$RUN_ID" != "$BEFORE" ]; then
              break
            fi
            sleep 5
          done

          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "$BEFORE" ]; then
            echo "::error::Builder workflow run did not appear within 60s"
            exit 1
          fi

          echo "Watching builder run #${RUN_ID}..."
          gh run watch "${RUN_ID}" --exit-status || {
            CONCLUSION=$(gh run view "${RUN_ID}" --json conclusion --jq '.conclusion')
            echo "::error::Builder workflow #${RUN_ID} finished with conclusion: ${CONCLUSION}"
            exit 1
          }
          echo "::notice::Builder workflow #${RUN_ID} completed successfully"
